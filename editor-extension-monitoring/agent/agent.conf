<!--
  Wazuh centralized agent configuration — editor extension monitoring (Windows).

  Add this <agent_config> block to the agent.conf of the group holding your developer
  workstations, e.g. /var/ossec/etc/shared/<group>/agent.conf

  Prerequisites:
    * Drop Get-EditorExtensions.ps1 into the same shared/<group>/ folder — Wazuh distributes
      it to each agent under  C:\Program Files (x86)\ossec-agent\shared\
    * Enable remote command execution on each agent (out-of-band, e.g. via GPO/SCCM):
        local_internal_options.conf:  logcollector.remote_commands=1
-->
<agent_config os="windows">
  <syscheck>
    <!-- One monitored entry per extension (the manifest). This deliberately does NOT index
         every file inside an extension; doing so quickly exhausts the 100k FIM file_limit. -->
    <directories realtime="yes" check_all="yes" recursion_level="2" restrict="package\.json$">C:\Users\*\.vscode\extensions</directories>
    <directories realtime="yes" check_all="yes" recursion_level="2" restrict="package\.json$">C:\Users\*\.vscode-insiders\extensions</directories>
    <directories realtime="yes" check_all="yes" recursion_level="2" restrict="package\.json$">C:\Users\*\.vscode-server\extensions</directories>
    <directories realtime="yes" check_all="yes" recursion_level="6" report_changes="yes" restrict="vsixmanifest$|catalog\.json$">C:\Users\*\AppData\Local\Microsoft\VisualStudio</directories>
    <!-- Global: never FIM-monitor dependency/build trees (applies to all syscheck dirs). -->
    <ignore type="sregex">node_modules</ignore>
  </syscheck>

  <localfile>
    <log_format>command</log_format>
    <command>powershell.exe -NoProfile -NonInteractive -ExecutionPolicy Bypass -File "C:\Program Files (x86)\ossec-agent\shared\Get-EditorExtensions.ps1"</command>
    <alias>editor-extensions</alias>
    <frequency>86400</frequency>
    <out_format>$(timestamp) $(hostname) editor-extensions: $(log)</out_format>
  </localfile>
</agent_config>
